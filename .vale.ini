StylesPath = .vale/styles
MinAlertLevel = warning

Packages = Google, write-good, proselint

[.vale/*]
BasedOnStyles =

[*.md]
BasedOnStyles = Vale, write-good, proselint
# Skip text inside double quotes (direct quotations from external sources)
TokenIgnores = ("[^"]+")
# Skip blockquote lines (always external quotes in this project)
BlockIgnores = (?s) *>.*

# Disable rules that don't fit cheatsheets
Google.Headings = NO
Google.Parens = NO
Google.Acronyms = NO
Vale.Spelling = NO
write-good.TooWordy = NO
write-good.Weasel = NO
write-good.ThereIs = NO
write-good.Cliches = NO
proselint.Very = NO
proselint.Cliches = NO
proselint.Typography = NO
write-good.So = NO
